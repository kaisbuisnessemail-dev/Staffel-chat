workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 30
    environment:
      flutter: stable
      vars:
        flutter_version: 3.24.3
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
