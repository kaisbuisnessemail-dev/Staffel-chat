name: staffel_chat
description: Private, encrypted, unlimited chat.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.2
  cached_network_image: ^3.3.1
  provider: ^6.1.2
  socket_io_client: ^2.0.3
  flutter_local_notifications: ^17.0.0
  flutter_secure_storage: ^9.2.2
  video_player: ^2.9.0
  chewie: ^1.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
